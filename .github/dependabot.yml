version: 2
updates:
  # Rust dependencies
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "awald-app/maintainers"
    assignees:
      - "awald-app/maintainers"
    ignore:
      # Ignore pyo3 major/minor updates (breaking changes)
      - dependency-name: "pyo3"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  # npm/pnpm dependencies
  - package-ecosystem: "npm"
    directory: "/src"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "awald-app/maintainers"
    assignees:
      - "awald-app/maintainers"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "awald-app/maintainers"
    assignees:
      - "awald-app/maintainers"
